name: auto pr

on:
  push:
    branches-ignore:
      - main
      - master
      - "dependabot/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip if somehow triggered on a non-branch ref.
            if (!context.ref.startsWith('refs/heads/')) {
              core.info(`Skipping non-branch ref: ${context.ref}`);
              return;
            }

            // Check for existing open PRs from this branch
            const head = `${owner}:${branch}`;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              per_page: 1,
            });

            if (pulls.data.length > 0) {
              core.info(`PR already exists for ${head}: #${pulls.data[0].number}`);
              return;
            }

            const title = `Auto PR: ${branch}`;
            const body = [
              'Created automatically on push.',
              '',
              `- Branch: \`${branch}\``,
              `- Commit: \`${context.sha}\``,
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: branch,
              base: 'main',
            });

            core.info(`Created PR: #${pr.data.number} ${pr.data.html_url}`);
